# ~/.config/starship/starship.toml
# Preset A: tail-2 repo path | branch(status) → >

# Single-line format avoids leading blank line from multiline strings
format = "$python$directory$git_branch$git_status$line_break$character"
add_newline = false

[gcloud]
disabled = true

[aws]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

[directory]
truncation_length = 2
truncate_to_repo = true
style = "bold cyan"
read_only = " 🔒"

[git_branch]
format = "| [$branch]($style)"
symbol = ""

[git_status]
# Escaped parens — unescaped () are parsed as markup, producing "main?" not "main(?)"
format = "\\([$all_status$ahead_behind\\)]($style)"
style = "bold red"
conflicted = "✖"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "⇅"
untracked = "?"
stashed = "≡"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[>](bold yellow)"

[python]
format = "\\([$virtualenv\\)]($style) "
style = "bold yellow"

[fill]
symbol = " "
