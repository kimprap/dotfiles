# ~/.config/starship/starship.toml
# Preset A + miloshadzic colors (fg[cyan|red|green|yellow] — not bold)

format = "$python$directory$git_branch$git_status$line_break$character"
add_newline = false

[gcloud]
disabled = true

[aws]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

# milo: %{$fg[cyan]%}%1~%{$reset_color%}
[directory]
truncation_length = 2
truncate_to_repo = true
style = "cyan"
read_only = " 🔒"

# milo: %{$fg[red]%}|%{$reset_color%}$(git_prompt_info with %{$fg[green]%} branch)
[git_branch]
format = "[|](red) [$branch](green)"
symbol = ""

# milo: %{$fg[yellow]%}(*)%{$reset_color%} — parens + symbols all yellow
[git_status]
format = '[(\($all_status$ahead_behind\))](yellow)'
style = "yellow"
conflicted = "✖"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "⇅"
untracked = "?"
stashed = "≡"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"

# milo: %{$fg[cyan]%}⇒%{$reset_color%} (using > per preset A)
[character]
success_symbol = "[>](cyan)"
error_symbol = "[>](red)"
vimcmd_symbol = "[>](yellow)"

# milo: %{$fg[yellow]%}(venv)%{$reset_color%} with leading space
[python]
format = ' (\($virtualenv\) )'
style = "yellow"

[fill]
symbol = " "
