# ~/.config/starship/starship.toml
# Preset A + miloshadzic colors

format = "$python$directory$git_branch$git_status$line_break$character"
add_newline = false

[gcloud]
disabled = true

[aws]
disabled = true

[kubernetes]
disabled = true

[docker_context]
disabled = true

# milo: %{$fg[cyan]%}%1~
[directory]
truncation_length = 2
truncate_to_repo = true
style = "bold cyan"
read_only = " 🔒"

# milo: %{$fg[red]%}|%{$reset_color%} + green branch
[git_branch]
format = "[|](bold red) [$branch](bold green)"
symbol = ""

# milo: %{$fg[yellow]%}(*)%{$reset_color%} — optional () omitted when clean
[git_status]
format = '(\($all_status$ahead_behind\))'
style = "bold yellow"
conflicted = "✖"
ahead = "↑${count}"
behind = "↓${count}"
diverged = "⇅"
untracked = "?"
stashed = "≡"
modified = "*"
staged = "+"
renamed = "»"
deleted = "✘"

# milo: %{$fg[cyan]%}⇒
[character]
success_symbol = "[>](bold cyan)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[>](bold yellow)"

# milo: %{$fg[yellow]%}(venv)%{$reset_color%}
[python]
format = '(\($virtualenv\) )'
style = "bold yellow"

[fill]
symbol = " "
